<!DOCTYPE html>
<html>
<head>
<title>Plant Disease Detection</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
width:420px;
border-radius:15px;
box-shadow:0px 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h1{
color:#2c3e50;
margin-bottom:10px;
}

p{
color:#555;
}

.preview{
margin-top:20px;
display:flex;
justify-content:center;
align-items:center;
}

.preview img{
max-width:250px;
max-height:250px;
border-radius:10px;
display:none;
box-shadow:0px 5px 15px rgba(0,0,0,0.2);
object-fit:contain;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:8px;
background:#27ae60;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1e8449;
transform:scale(1.05);
}

/* Loading spinner */

.loader{
display:none;
margin-top:20px;
border:6px solid #f3f3f3;
border-top:6px solid #27ae60;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin-left:auto;
margin-right:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

<script>

function previewImage(event){

var reader = new FileReader();

reader.onload = function(){

var output = document.getElementById('preview-img');

output.src = reader.result;
output.style.display = "block";

}

reader.readAsDataURL(event.target.files[0]);

}

function showLoader(){

document.getElementById("loader").style.display="block";

}

</script>

</head>

<body>

<div class="container">

<h1>🌿 Plant Disease Detection</h1>

<p>Upload a tomato leaf image</p>

<form action="/predict" method="post" enctype="multipart/form-data" onsubmit="showLoader()">

<input type="file" name="file" accept="image/*" onchange="previewImage(event)" required>

<div class="preview">
<img id="preview-img">
</div>

<button type="submit">🔍 Detect Disease</button>

<div id="loader" class="loader"></div>

</form>

</div>

</body>
</html>
