<!DOCTYPE html>
<html>
<head>
<title>Prediction Result</title>

<style>

body{
font-family:'Segoe UI', sans-serif;
background: linear-gradient(135deg,#6dd5fa,#2980b9);
min-height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
width:450px;
max-width:92%;
border-radius:18px;
box-shadow:0px 15px 40px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-top:0;
color:#1e3c72;
font-weight:600;
}

img{
width:240px;
border-radius:12px;
margin:20px 0;
box-shadow:0px 8px 20px rgba(0,0,0,0.25);
}

.result{
font-size:22px;
color:#2c3e50;
margin-bottom:5px;
}

.confidence{
font-size:18px;
color:#27ae60;
font-weight:600;
margin-bottom:20px;
}

.treatment{
background:#e8f8f5;
padding:18px;
border-radius:12px;
margin-top:10px;
border-left:5px solid #2ecc71;
}

.treatment h3{
margin-top:0;
color:#145a32;
}

button{
margin-top:25px;
padding:12px 28px;
background:#3498db;
border:none;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:all 0.25s ease;
}

button:hover{
background:#21618c;
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<h2>🧪 Prediction Result</h2>

<img src="{{ url_for('uploaded_file', filename=image) }}">

<p class="result">
Disease: <b>{{result}}</b>
</p>

<p class="confidence">
Confidence: {{confidence}}%
</p>

<div class="treatment">

<h3>🌱 Treatment Suggestion</h3>

<p>{{treatment}}</p>

</div>

<form action="/">
<button>⬅ Upload Another Image</button>
</form>

</div>

</body>
</html>
